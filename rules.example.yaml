# =============================================================================
# rules.example.yaml — Configuration for Proc-Product-Photos pipeline
#
# ZERO-MARGIN MODE: Customer requires no whitespace margins in output.
# Product edges extend to canvas edges. Margins are added by the web
# platform when images are displayed.
#
# Copy to rules.yaml and adjust values as needed.
# All thresholds are tunable without code changes.
# =============================================================================

# ---------------------------------------------------------------------------
# Global defaults (apply unless overridden per category)
# ---------------------------------------------------------------------------
global:
  # Final output canvas
  canvas_size: 1000               # Square canvas side length in pixels
  jpeg_quality: 95                # JPEG compression quality (1-100)
  background_color: [255, 255, 255]  # Canvas background RGB

  # Background detection (LAB-space weighted distance)
  white_distance_threshold: 12.0  # Weighted LAB distance to consider "white"
  edge_whiteness_threshold: 0.85  # Fraction of border pixels that must be white
  alpha_threshold: 128            # Alpha value above which pixel is foreground

  # Object detection
  min_object_ratio: 0.005         # Minimum mask area / image area
  max_bbox_ratio: 0.99            # Maximum bbox area / image area
  min_bbox_ratio: 0.01            # Minimum bbox area / image area

  # Morphology defaults
  morph_kernel_size: 5
  morph_iterations: 2
  min_component_size: 500

  # Edge proximity — set to 0 for zero-margin mode
  edge_proximity_px: 0

  # Adaptive thresholding (complex backgrounds)
  adaptive_block_size: 21
  adaptive_c: 10.0

  # Output naming
  filename_pattern: "{store_article}_{suffix}.jpg"

# ---------------------------------------------------------------------------
# Fallback strategy
# ---------------------------------------------------------------------------
fallback:
  enabled: true
  strategy: grabcut
  grabcut_iterations: 5
  max_attempts: 1
  validation_tolerance: 0.8

# ---------------------------------------------------------------------------
# Category-specific crop rules — ZERO MARGIN
#
# margin_pct: 0 for all categories (no whitespace added)
# target_fill_ratio: [0.85, 1.0] — product fills canvas edge-to-edge
# edge_proximity_px: 0 — object at canvas edge is expected, not an error
# ---------------------------------------------------------------------------
categories:
  CLUB_LONG:
    margin_pct: 0.0
    threshold_bias: -2.0
    morph_kernel_size: 3
    morph_iterations: 2
    min_component_size: 300
    target_fill_ratio: [0.85, 1.0]
    thin_object_protection: true
    min_output_px: 30
    edge_proximity_px: 0

  CLUB_HEAD_ONLY:
    margin_pct: 0.0
    morph_kernel_size: 5
    min_component_size: 400
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0

  BALL:
    margin_pct: 0.0
    threshold_bias: -6.0
    morph_kernel_size: 5
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0

  SHOE:
    margin_pct: 0.0
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0

  BAG:
    margin_pct: 0.0
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0

  APPAREL_FOLDED:
    margin_pct: 0.0
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0

  APPAREL_WORN_OR_SHAPED:
    margin_pct: 0.0
    target_fill_ratio: [0.85, 1.0]
    adaptive_block_size: 25
    adaptive_c: 8.0
    edge_proximity_px: 0

  ACCESSORY_SMALL:
    margin_pct: 0.0
    min_component_size: 50
    target_fill_ratio: [0.08, 1.0]
    min_output_px: 100
    edge_proximity_px: 0

  BOX_OR_PACKAGING:
    margin_pct: 0.0
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0
