# =============================================================================
# rules.example.yaml — Configuration for Proc-Product-Photos pipeline
#
# ASYMMETRIC MARGIN MODE: Each category has per-side margin rules based on
# analysis of 595 real supplier images.  Shafts touch edge, balls get uniform
# padding, shoes are tight horizontal, etc.
#
# Per-side margins: margin_top, margin_bottom, margin_left, margin_right
# Set to -1 to fall back to margin_pct (uniform).
# Set to 0.0 for zero margin on that side.
#
# Output naming: {source_stem}-cropped.jpg (preserves original filename)
#
# Copy to rules.yaml and adjust values as needed.
# =============================================================================

# ---------------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------------
global:
  canvas_size: 1000
  jpeg_quality: 95
  background_color: [255, 255, 255]

  # Background detection
  white_distance_threshold: 12.0
  edge_whiteness_threshold: 0.85
  alpha_threshold: 128

  # Object detection
  min_object_ratio: 0.005
  max_bbox_ratio: 1.0               # Allow full-frame products
  min_bbox_ratio: 0.01

  # Morphology defaults
  morph_kernel_size: 5
  morph_iterations: 2
  min_component_size: 500

  edge_proximity_px: 0

  # Adaptive thresholding (complex backgrounds)
  adaptive_block_size: 21
  adaptive_c: 10.0

  # Output naming — {source_stem} = original filename without extension
  filename_pattern: "{source_stem}-cropped.{ext}"

# ---------------------------------------------------------------------------
# Fallback strategy
# ---------------------------------------------------------------------------
fallback:
  enabled: true
  strategy: grabcut
  grabcut_iterations: 5
  max_attempts: 1
  validation_tolerance: 0.7

# ---------------------------------------------------------------------------
# Quality gate — auto-pause on high category failure rate
# ---------------------------------------------------------------------------
quality_gate:
  enabled: true
  check_interval: 50          # check every N images processed
  min_samples: 10             # need at least N images in a category before checking
  min_success_rate: 0.70      # pause if success rate drops below 70%
  action: warn                # warn = log and continue | abort = stop pipeline | ignore = skip

# ---------------------------------------------------------------------------
# Category-specific crop rules — ASYMMETRIC MARGINS
#
# Derived from analysis of real supplier images:
#   CLUB_LONG:  shaft → 0%, head → 5%  (highly asymmetric)
#   BALL:       uniform ~8%             (symmetric, always padded)
#   SHOE:       horizontal ~2%, vertical by aspect ratio
#   BAG:        vertical tight ~2%
#   APPAREL:    vertical 0%, horizontal by shape
# ---------------------------------------------------------------------------
categories:
  CLUB_LONG:
    margin_pct: 0.0               # shaft ends: zero
    margin_top: 0.05              # head area: breathing room
    margin_bottom: 0.0            # shaft end: zero
    threshold_bias: -2.0
    morph_kernel_size: 3
    morph_iterations: 2
    min_component_size: 300
    target_fill_ratio: [0.75, 1.0]
    thin_object_protection: true
    min_output_px: 30
    edge_proximity_px: 0

  CLUB_HEAD_ONLY:
    margin_pct: 0.06              # uniform — compact object
    morph_kernel_size: 5
    min_component_size: 400
    target_fill_ratio: [0.80, 1.0]
    edge_proximity_px: 0

  BALL:
    margin_pct: 0.08              # uniform ~8% all sides
    threshold_bias: -6.0
    morph_kernel_size: 5
    target_fill_ratio: [0.70, 1.0]
    edge_proximity_px: 0

  SHOE:
    margin_pct: 0.02              # default: tight
    margin_left: 0.02
    margin_right: 0.02
    target_fill_ratio: [0.80, 1.0]
    edge_proximity_px: 0

  BAG:
    margin_pct: 0.02
    margin_top: 0.02
    margin_bottom: 0.02
    target_fill_ratio: [0.80, 1.0]
    edge_proximity_px: 0

  APPAREL_FOLDED:
    margin_pct: 0.01
    margin_top: 0.0
    margin_bottom: 0.0
    target_fill_ratio: [0.80, 1.0]
    edge_proximity_px: 0

  APPAREL_WORN_OR_SHAPED:
    margin_pct: 0.02
    target_fill_ratio: [0.75, 1.0]
    adaptive_block_size: 25
    adaptive_c: 8.0
    edge_proximity_px: 0

  ACCESSORY_SMALL:
    margin_pct: 0.05
    min_component_size: 50
    target_fill_ratio: [0.08, 1.0]
    min_output_px: 100
    edge_proximity_px: 0

  BOX_OR_PACKAGING:
    margin_pct: 0.02
    target_fill_ratio: [0.85, 1.0]
    edge_proximity_px: 0
